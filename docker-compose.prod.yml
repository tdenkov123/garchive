services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: fms
    volumes:
      - postgres_data:/var/lib/postgresql
    networks: [internal]

  redis:
    image: redis:8.8.0-alpine
    networks: [internal]

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks: [internal]

  kafka:
    image: apache/kafka:4.3.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [internal]

  app:
    build: .
    depends_on: [postgres, redis, minio, kafka]
    environment:
      APP_ENV: production
      GRPC_INSECURE: "false"
      GRPC_ENABLE_REFLECTION: "false"
      GRPC_TLS_CERT: /certs/tls.crt
      GRPC_TLS_KEY: /certs/tls.key
      POSTGRES_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/fms?sslmode=disable
      REDIS_ADDR: redis:6379
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      KAFKA_BROKERS: kafka:9092
      JWT_ENABLED: ${JWT_ENABLED:-true}
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:?set JWT_HMAC_SECRET}
    ports:
      - "50051:50051"
      - "9090:9090"
    volumes:
      - ./certs:/certs:ro
    networks: [internal, public]

networks:
  internal:
    internal: true
  public:

volumes:
  postgres_data:
  minio_data:
