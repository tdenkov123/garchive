version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosec
    - bodyclose
    - revive
    - ineffassign
    - unused
  settings:
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: error-return
        - name: error-strings
    gosec:
      excludes:
        - G104
        - G115
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
